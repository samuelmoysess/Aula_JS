        <script>
            function triste (){
                var tag_img = document.getElementsByTagName('img') [0]
                console.log(tag_img)
                tag_img.src="img/emoji_feliz.jpeg" ;
            }

            function feliz (){
                var tag_img = document.getElementsByTagName('img') [0]
                console.log(tag_img)
                tag_img.src="img/emoji_triste.png" ;
            }
        </script>
