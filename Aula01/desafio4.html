    <h1> integrando os recursos de interativaidade do JS  </h1>
    <hr>
    <p id="resultado">  </p>
    <script>
        window.alert("Seja bem-vindo ao site");

        let p = window.prompt("diga seu peso");
        console.log(p)

        let h = window.prompt("diga sua autura");
         console.log(h)


         let cont = window.prompt("digite 1 para confirmar");
         console.log(cont);
         let resultado = 0


        if (cont == "1") {            
            resultado = (parseFloat(h) * parseFloat(h)/p)            
        }else{           
            window.alert("RESPONDE DE NOVO BURRO")
        }

        document.getElementById("resultado").innerHTML=resultado



    </script>
