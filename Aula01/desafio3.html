<body>
    <h1> Integrando Os Recursos De Interativaidade Do JS  </h1>
    <hr>
    <p id="resultado"> </p>
    <script>
        window.alert("Seja bem-vindo ao site");

        let n1 = window.prompt("diga um valor");
        console.log(n1)

        let n2 = window.prompt("diga um  segundo valor");
         console.log(n2)


         let cont = window.prompt("digite +,-,x ou /  ");
         console.log(cont);
         let resultado = 0


        if (cont == "+") {            
            resultado = (parseFloat(n1) + parseFloat(n2))            
        }

        else if(cont == "-"){


            resultado =(parseFloat(n1) - parseFloat(n2))

        }else if(cont == "x"){

               resultado =(parseFloat(n1) * parseFloat(n2))

        }
        else{

         resultado =(parseFloat(n1) / parseFloat(n2))
        }
        

        document.getElementById("resultado").innerHTML=resultado



    </script>
